<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoysTrip | Headquarters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Modern Masculine Font Stack -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        navy: '#0f172a', // Deep rich navy blue
                        btgreen: '#10b981' // Vibrant emerald green
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Oswald', sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-navy antialiased min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-4xl w-full text-center fade-in">
        
        <!-- BoysTrip Logo (Strictly Image) -->
        <img src="logo.png" alt="BoysTrip Logo" class="w-full max-w-[40rem] mx-auto mb-10 drop-shadow-sm">
        
        <p class="text-btgreen tracking-[0.4em] uppercase text-xs md:text-sm font-bold mb-16">Global Headquarters</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
            
            <!-- Commissioner App Link -->
            <a href="planner.html" class="group relative block p-8 md:p-10 bg-navy rounded-2xl border-2 border-transparent hover:border-btgreen transition-all duration-300 hover:shadow-[0_10px_40px_rgba(16,185,129,0.2)] hover:-translate-y-1">
                <div class="text-4xl md:text-5xl mb-4 opacity-70 group-hover:opacity-100 transition-opacity group-hover:scale-110 transform duration-300 origin-left">💼</div>
                <h2 class="font-display uppercase tracking-wide text-2xl md:text-3xl font-bold mb-2 text-white group-hover:text-btgreen transition-colors text-left">Commissioner Portal</h2>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold text-left">Build & Manage The Tour</p>
            </a>

            <!-- Player App Link -->
            <a href="scotland_ireland_tour.html" class="group relative block p-8 md:p-10 bg-navy rounded-2xl border-2 border-transparent hover:border-btgreen transition-all duration-300 hover:shadow-[0_10px_40px_rgba(16,185,129,0.2)] hover:-translate-y-1">
                <div class="text-4xl md:text-5xl mb-4 opacity-70 group-hover:opacity-100 transition-opacity group-hover:scale-110 transform duration-300 origin-left">⛳️</div>
                <h2 class="font-display uppercase tracking-wide text-2xl md:text-3xl font-bold mb-2 text-white group-hover:text-btgreen transition-colors text-left">Player App</h2>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold text-left">Access Live Match Data</p>
            </a>

        </div>

        <div class="mt-20 text-slate-400 text-[10px] tracking-widest font-bold">
            &copy; 2026 BoysTrip • A Stable Orbit Production
        </div>
    </div>

</body>
</html>
